name: Tests (latest stack)

# Runs the full unit suite on a CLEAN environment resolving the NEWEST allowed
# package versions — catches silent breakage (e.g. pandas major bumps) before
# a cloud redeploy does.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Unit tests
        env:
          PYTHONUTF8: "1"
          MPLBACKEND: "Agg"
        run: python -m pytest tests/ -q
